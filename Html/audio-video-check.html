<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and video check</title>
</head>
<body>
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="#home">HOME | </a><a href="#audio"> AUDIO |</a><a href="#video">VIDEO</a>
    </nav> 
  </header>

    <main>
        <div id="audio">
            <h5>This the audio file...</h5>
            <p>click to feel the havenly melody</p>

        </div>
    </main>

    <aside>
        <p>Subscribe for updates!</p>
    </aside>
    <footer>
        <p>&copy; 2025 My Website</p>
    </footer>
</body>
</html>
