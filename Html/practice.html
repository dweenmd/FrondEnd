<html>
<head>
    <title>HTML Tag Example</title>
</head>
<body>
    <font size="6" color="blue" face="Arial">
        <center>HTML Tag Example</center>
    </font>
    <hr>
    <h2>Ordered List</h2>
    <ol type="A">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>
    <h2>Unordered List</h2>
    <ul type="circle">
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ul>
    <h2>Description List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
    </dl>
    <hr>
    <h2>Image Example</h2>
    <img src="image.png" height="100" width="150">
    <hr>
    <h2>Link Example</h2>
    <a href="https://www.google.com" target="_blank">Visit Google</a>
</body>
</html>
